<section id="routes" class="section-reactive">
    <div class="routes-header reveal">
        <span class="label-tag">Trade Routes</span>
        <h2>The Network.</h2>
        <p>Key corridors connecting Al-Naser to global markets via Iraq's strategic geographic position.</p>
    </div>
    <div class="map-wrap reveal">
        <svg class="map-svg" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Grid pattern -->
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(201,168,76,0.05)" stroke-width="0.5"/>
                    <circle cx="20" cy="20" r="0.6" fill="rgba(201,168,76,0.08)"/>
                </pattern>

                <!-- Hub glow gradient -->
                <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(201,168,76,0.5)"/>
                    <stop offset="35%" stop-color="rgba(201,168,76,0.18)"/>
                    <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
                </radialGradient>

                <!-- Destination glow -->
                <radialGradient id="destGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(201,168,76,0.35)"/>
                    <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
                </radialGradient>

                <!-- Ship symbol (bow points right for animateMotion rotate="auto") -->
                <g id="ship">
                    <path d="M-8,0 Q-5,4 0,4.5 Q5,4 9,0.5 L7,-0.5 Q4,3 0,3 Q-4,3 -7,-0.5 Z" fill="var(--gold)"/>
                    <line x1="-1" y1="0" x2="-1" y2="-12" stroke="var(--gold)" stroke-width="0.7"/>
                    <path d="M-1,-11 L-2,-2 L6,-3.5 Z" fill="var(--gold-lt)" opacity="0.9"/>
                    <line x1="8" y1="0.5" x2="8" y2="-5" stroke="var(--gold)" stroke-width="0.4"/>
                    <path d="M8,-5 L5,-4 L8,-3" fill="var(--gold-lt)" opacity="0.75"/>
                    <circle cx="0" cy="0" r="0.8" fill="var(--gold-lt)" opacity="0.6"/>
                </g>

                <!-- ===== ROUTE PATHS (defined for both display and ship motion) ===== -->
                <!-- Primary -->
                <path id="route-europe" d="M468 175 Q380 100 180 110"/>
                <path id="route-china" d="M468 175 Q600 120 790 115"/>
                <!-- Secondary -->
                <path id="route-sasia" d="M468 175 Q540 155 660 175"/>
                <path id="route-africa" d="M468 175 Q430 210 345 275"/>
                <!-- Tertiary -->
                <path id="route-seasia" d="M468 175 Q580 200 720 230"/>
                <path id="route-eastafrica" d="M468 175 Q400 250 380 320"/>
                <path id="route-centralasia" d="M468 175 Q500 80 620 60"/>
                <!-- Cross routes -->
                <path id="route-china-seasia" d="M790 115 Q760 165 720 230"/>
                <path id="route-sasia-seasia" d="M660 175 Q700 200 720 230"/>
                <path id="route-africa-med" d="M345 275 Q300 190 280 125"/>
                <path id="route-europe-med" d="M180 110 Q230 118 280 125"/>
                <path id="route-china-sasia" d="M790 115 Q730 145 660 175"/>
            </defs>

            <!-- Background grid -->
            <rect width="900" height="420" fill="var(--d4)"/>
            <rect width="900" height="420" fill="url(#grid)"/>

            <!-- Subtle ocean texture rings -->
            <g fill="none" stroke="rgba(201,168,76,0.03)" stroke-width="0.5">

                <circle cx="468" cy="175" r="100"/>
                <circle cx="468" cy="175" r="160"/>
                <circle cx="468" cy="175" r="230"/>
            </g>

            <!-- ===== LANDMASSES (enhanced, more detailed) ===== -->

            <!-- Indonesian isles -->
            <path d="M745 268 Q758 262 772 268 Q775 278 768 285 Q755 288 745 280 Q740 274 745 268Z"
            fill="rgba(8,45,71,0.7)" stroke="rgba(201,168,76,0.08)" stroke-width="0.4"/>
            <path d="M770 275 Q785 270 795 278 Q792 288 780 290 Q770 286 770 275Z"
            fill="rgba(8,45,71,0.65)" stroke="rgba(201,168,76,0.06)" stroke-width="0.4"/>

                <use href="#route-europe"/>
                <use href="#route-china"/>
            </g>

            <circle class="hub-pulse" cx="468" cy="175" r="6" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
            <circle class="hub-pulse" cx="468" cy="175" r="6" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
            <!-- Extra pulse rings for complexity -->
            <circle class="hub-pulse" cx="468" cy="175" r="8" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="0.6"/>

            <g><animateMotion dur="8s" repeatCount="indefinite" rotate="auto" begin="2.7s"><mpath href="#route-sasia"/></animateMotion><use href="#ship" transform="scale(0.55)"/></g>

            <g><animateMotion dur="10s" repeatCount="indefinite" rotate="auto" begin="3.3s"><mpath href="#route-africa"/></animateMotion><use href="#ship" transform="scale(0.55)"/></g>
            <g><animateMotion dur="10s" repeatCount="indefinite" rotate="auto" begin="6.7s"><mpath href="#route-africa"/></animateMotion><use href="#ship" transform="scale(0.55)"/></g>

            <!-- ===== TRAVELING DOTS ON TERTIARY ROUTES ===== -->

                <animateMotion dur="7s" repeatCount="indefinite" begin="0s"><mpath href="#route-seasia"/></animateMotion>
            </circle>
            <circle r="1.8" fill="rgba(201,168,76,0.5)" opacity="0.6">

            </circle>

            <circle r="2" fill="rgba(201,168,76,0.55)" opacity="0.6">
                <animateMotion dur="8s" repeatCount="indefinite" begin="0s"><mpath href="#route-eastafrica"/></animateMotion>
            </circle>
            <circle r="1.6" fill="#e2c278" opacity="0.5">
                <animateMotion dur="8s" repeatCount="indefinite" begin="2.7s"><mpath href="#route-eastafrica"/></animateMotion>
            </circle>

            <circle r="1.8" fill="#e2c278" opacity="0.55">
                <animateMotion dur="6s" repeatCount="indefinite" begin="0s"><mpath href="#route-centralasia"/></animateMotion>
            </circle>
            <circle r="1.5" fill="rgba(201,168,76,0.45)" opacity="0.5">
                <animateMotion dur="6s" repeatCount="indefinite" begin="2s"><mpath href="#route-centralasia"/></animateMotion>
            </circle>
            <circle r="1.8" fill="#e2c278" opacity="0.55">
                <animateMotion dur="6s" repeatCount="indefinite" begin="4s"><mpath href="#route-centralasia"/></animateMotion>

                <animateMotion dur="10s" repeatCount="indefinite" begin="0s"><mpath href="#route-china-seasia"/></animateMotion>

<style>

     :root {
     
      --d4: #041828;
     
      --gold:     #c9a84c;
      --gold-lt:  #e2c278;
      --gold-dim: rgba(201,168,76,0.15);
      --text:     #cddde8;
      --muted:    #6a92aa;
      --border:   rgba(201,168,76,0.14);
    }

    /* ===== PULSE ANIMATIONS ===== */
    @keyframes hubPulse {
        0% {
            r: 6;
            opacity: 0.9;
        }
        60% {
            r: 38;
            opacity: 0;
        }
        100% {
            r: 6;
            opacity: 0;
        }
    }
    @keyframes hubPulse2 {
        0% {
            r: 8;
            opacity: 0.7;
        }
        55% {
            r: 44;
            opacity: 0;
        }
        100% {
            r: 8;
            opacity: 0;
        }
    }
    @keyframes hubPulse3 {
        0% {
            r: 10;
            opacity: 0.5;
        }
        50% {
            r: 50;
            opacity: 0;
        }
        100% {
            r: 10;
            opacity: 0;
        }
    }

    .hub-pulse {
        animation: hubPulse 3s ease-out infinite;
    }
    .hub-pulse:nth-child(2) {
        animation: hubPulse2 3s ease-out 0.6s infinite;
    }
    .hub-pulse:nth-child(3) {
        animation: hubPulse 3s ease-out 1.2s infinite;
    }
    .hub-pulse:nth-child(4) {
        animation: hubPulse2 3s ease-out 0.3s infinite;
    }
    .hub-pulse:nth-child(5) {
        animation: hubPulse3 3.5s ease-out 0.9s infinite;
    }

    @keyframes cityPing {
        0% {
            r: 4;
            opacity: 0.8;
        }
        70% {
            r: 18;
            opacity: 0;
        }
        100% {
            r: 4;
            opacity: 0;
        }
    }
    @keyframes cityPingSmall {
        0% {
            r: 3;
            opacity: 0.6;
        }
        70% {
            r: 14;
            opacity: 0;
        }
        100% {
            r: 3;
            opacity: 0;
        }
    }

    .city-ping {
        animation: cityPing 3.5s ease-out infinite;
    }
    /* Stagger city pings */
    .city-ping:nth-of-type(2) {
        animation-delay: 0.8s;
    }
    .city-ping:nth-of-type(3) {
        animation-delay: 1.6s;
    }
    .city-ping:nth-of-type(4) {
